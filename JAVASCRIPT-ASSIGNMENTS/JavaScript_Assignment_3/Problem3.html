<!DOCTYPE html>
<html>
<head>
    <title>Location Logger</title>
</head>
<body onload="loadHistory()">

    <h2>Location-Based Weather Logger</h2>

    <button onclick="getLocation()">Get My Location</button>

    <h3>Current Location:</h3>
    <p id="currentLocation"></p>

    <h3>Location History (Last 5):</h3>
    <div id="history"></div>

    <script>

        function getLocation() {

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    showPosition, 
                    showError,
                    { timeout: 10000 }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        function showPosition(position) {

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            document.getElementById("currentLocation").innerText =
                "Latitude: " + lat + " | Longitude: " + lon;

            let locationEntry = {
                latitude: lat,
                longitude: lon,
                time: new Date().toLocaleString()
            };

        
            let history = JSON.parse(localStorage.getItem("locations")) || [];

        
            history.unshift(locationEntry);

            
            if (history.length > 5) {
                history = history.slice(0, 5);
            }

            
            localStorage.setItem("locations", JSON.stringify(history));

            loadHistory();
        }

        
        function showError(error) {

            let message = "";

            switch (error.code) {
                case error.PERMISSION_DENIED:
                    message = "Permission denied by user.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = "Location information unavailable.";
                    break;
                case error.TIMEOUT:
                    message = "Request timed out.";
                    break;
                default:
                    message = "Unknown error occurred.";
            }

            document.getElementById("currentLocation").innerText = message;
        }

    
        function loadHistory() {

            let history = JSON.parse(localStorage.getItem("locations")) || [];
            let historyDiv = document.getElementById("history");

            historyDiv.innerHTML = "";

            for (let i = 0; i < history.length; i++) {
                historyDiv.innerHTML +=
                    "<p>Lat: " + history[i].latitude +
                    " | Lon: " + history[i].longitude +
                    " | Time: " + history[i].time + "</p>";
            }
        }

    </script>

</body>
</html>
