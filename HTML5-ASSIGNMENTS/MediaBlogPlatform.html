<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media Blog</title>
    <meta name="description" content="Tech media blog with articles, audio and video">
</head>

<body>

<header>
    <h1>Tech Media Blog</h1>

    Search:
    <input type="search" placeholder="Search articles...">
</header>

<main>

<article>
    <h2>Future of AI</h2>
    <p>By Admin | <time>2026-02-18</time></p>

    <img src="AI image.jpg" alt="AI Image" width="300">

    <audio controls loop>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <video controls width="400" poster="AI image.jpg">
        <source src="video.mp4" type="video/mp4">
    </video>
</article>

<section>
    <h2>Subscribe</h2>
    <form>
        Email:
        <input type="email" required>
        <input type="submit" value="Subscribe">
    </form>
</section>

</main>

<footer>
    <p>© 2026 Media Blog</p>
</footer>

</body>
</html>
