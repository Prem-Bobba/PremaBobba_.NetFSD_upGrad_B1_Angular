<!DOCTYPE html>
<html>
<head>
    <title>SecureBank</title>
    <link rel="stylesheet" href="style3.css">

    <style>
        .balance-highlight {
            background: greenyellow;
            padding: 15px;
        }
    </style>
</head>
<body>

<div style="background:red; color:white; padding:10px;">
Warning: Suspicious Login Attempt
</div>

<header>
    <h1>SecureBank</h1>
</header>

<section class="balance-highlight">
    <h2>Account Balance: ₹50,000</h2>
</section>

<section class="summary">
    <div class="card">Savings</div>
    <div class="card">Loans</div>
</section>

<table>
<tr><th>Date</th><th>Type</th><th>Amount</th></tr>
<tr><td>01-01</td><td class="credit">Credit</td><td>+5000</td></tr>
<tr><td>02-01</td><td class="debit">Debit</td><td>-2000</td></tr>
</table>

<form>
    <input type="password" placeholder="Enter Password">
    <button>Login</button>
</form>

<footer>© 2026 SecureBank</footer>

</body>
</html>
